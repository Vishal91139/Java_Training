<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS box modal</title>
    <Style>
        .box {
            width: 200px;
            height: 100px;
            background-color: aquamarine;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 5px solid rgb(137, 221, 137);
        }
    </Style>
</head>
<body>
    <h2>Box Modal Demo</h2>
    <div class="box">Vishal</div>
</body>
</html>
