<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            height:200px;
            background-color: coral;
            justify-content:space-evenly;
            align-items: center;
        }
        .box {
            width: 100px;
            height: 100px;
            background-color: aquamarine;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 30%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }
        
    </style>
</head>
<body>
    <h2>Flex box demo</h2>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
</body>
</html>
